services:
  frontend:
    build: ./client
    ports:
      - '5173:5173'
    env_file: ./client/.env
    depends_on:
      - backend

  backend:
    build: ./server
    ports:
      - '5000:5000'
    env_file: ./server/.env
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

volumes:
  mongo_data:
